.ham-btn span {

}

.ham-btn.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.ham-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

.ham-overlay {

}

<script>
(function() {
  const btn     = document.getElementById('hamBtn');
  const drawer  = document.getElementById('hamDrawer');
  const overlay = document.getElementById('hamOverlay');

  function open() {
    btn.classList.add('open');
    drawer.classList.add('open');
    overlay.classList.add('open');
    btn.setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
  }
  function close() {
    btn.classList.remove('open');
    drawer.classList.remove('open');
    overlay.classList.remove('open');
    btn.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
  }

  btn.addEventListener('click', function() {
    drawer.classList.contains('open') ? close() : open();
  });
  overlay.addEventListener('click', close);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') close();
  });

  // 現在のページをハイライト
  var page = location.pathname.split('/').pop().replace('.html','');
  var links = drawer.querySelectorAll('[data-page]');
  links.forEach(function(a) {
    if (a.dataset.page === page) a.classList.add('active-page');
  });
})();
</script>
